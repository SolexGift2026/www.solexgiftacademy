<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Performance Entry Portal</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --primary-color: #007bff;
      --secondary-color: #28a745;
      --background-color: #f4f6f9;
      --card-background: #ffffff;
      --text-color: #333333;
      --border-color: #cccccc;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background-color);
      margin: 0;
      padding: 20px;
      color: var(--text-color);
    }

    .container {
      max-width: 700px;
      background: var(--card-background);
      margin: 20px auto;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: var(--text-color);
      margin-bottom: 25px;
      font-weight: 600;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 10px;
    }

    .section-title {
      font-size: 1.1em;
      color: var(--primary-color);
      margin-top: 20px;
      margin-bottom: 15px;
      font-weight: bold;
      border-bottom: 1px dashed var(--border-color);
      padding-bottom: 5px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-row {
      display: flex;
      gap: 15px;
    }

    .form-row .form-group {
      flex: 1;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555555;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 15px;
      background-color: #fafafa;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary-color);
      background-color: #ffffff;
      outline: none;
    }

    input[readonly] {
      background-color: #e9ecef;
      cursor: not-allowed;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background-color: var(--secondary-color);
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 10px;
    }

    .btn:hover {
      background-color: #218838;
    }

    #statusMessage {
      text-align: center;
      font-weight: bold;
      margin-top: 20px;
      min-height: 25px;
      font-size: 15px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Enter Student Results</h2>
  
  <form id="studentForm">
    <div class="section-title">Student Identity</div>
    
    <div class="form-row">
      <div class="form-group">
        <label for="studentId">Student ID *</label>
        <input type="text" id="studentId" placeholder="e.g. STU-101" required>
      </div>
      <div class="form-group">
        <label for="studentName">Student Name *</label>
        <input type="text" id="studentName" placeholder="Full Name" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="studentClass">Class *</label>
        <input type="text" id="studentClass" placeholder="e.g. JSS1" required>
      </div>
      <div class="form-group">
        <label for="term">Term *</label>
        <select id="term">
          <option value="First Term">First Term</option>
          <option value="Second Term">Second Term</option>
          <option value="Third Term">Third Term</option>
        </select>
      </div>
    </div>

    <div class="section-title">Academic Scores</div>

    <div class="form-group">
      <label for="subject">Subject *</label>
      <input type="text" id="subject" placeholder="e.g. Mathematics" required>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="caScore">CA Score (Continuous Assessment)</label>
        <input type="number" id="caScore" min="0" max="100" placeholder="0" oninput="calculateTotal()" required>
      </div>
      <div class="form-group">
        <label for="examScore">Examination Score</label>
        <input type="number" id="examScore" min="0" max="100" placeholder="0" oninput="calculateTotal()" required>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="totalScore">Total Score</label>
        <input type="number" id="totalScore" readonly placeholder="Auto-calculated">
      </div>
      <div class="form-group">
        <label for="grade">Grade</label>
        <input type="text" id="grade" readonly placeholder="Auto-calculated">
      </div>
    </div>

    <div class="form-group">
      <label for="remark">Teacher Remark</label>
      <textarea id="remark" rows="3" placeholder="Add a comment on performance..."></textarea>
    </div>

    <button type="button" class="btn" onclick="saveRecord()">Save Record to Database</button>
  </form>

  <p id="statusMessage"></p>
</div>

<script>
  // Supabase Configuration
  const SUPABASE_URL = "https://phmdfcbnnsghvylrkcxi.supabase.co";
  const SUPABASE_KEY = "sb_publishable_4tR9wcZM3E9co59Xbg4nvQ_mI5ln";
  
  // Initialize the Supabase Client
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Auto-calculation logic for Total and Grade
  function calculateTotal() {
    const ca = parseFloat(document.getElementById('caScore').value) || 0;
    const exam = parseFloat(document.getElementById('examScore').value) || 0;
    const total = ca + exam;

    document.getElementById('totalScore').value = total;

    let grade = "";
    if (total >= 70) grade = "A";
    else if (total >= 60) grade = "B";
    else if (total >= 50) grade = "C";
    else if (total >= 45) grade = "D";
    else if (total >= 40) grade = "E";
    else grade = "F";

    document.getElementById('grade').value = grade;
  }

  // Insert Record into the analysis Table
  async function saveRecord() {
    const statusMsg = document.getElementById('statusMessage');
    
    // Get field values
    const student_id = document.getElementById('studentId').value.trim();
    const student_name = document.getElementById('studentName').value.trim();
    const classVal = document.getElementById('studentClass').value.trim();
    const term = document.getElementById('term').value;
    const subject = document.getElementById('subject').value.trim();
    const ca_score = parseFloat(document.getElementById('caScore').value) || 0;
    const exam_score = parseFloat(document.getElementById('examScore').value) || 0;
    const total_score = parseFloat(document.getElementById('totalScore').value) || 0;
    const grade = document.getElementById('grade').value;
    const remark = document.getElementById('remark').value.trim();

    // Field Validation
    if (!student_id || !student_name || !subject || !classVal) {
      statusMsg.innerText = "❌ Please fill out all required fields marked with an asterisk (*)";
      statusMsg.style.color = "red";
      return;
    }

    statusMsg.innerText = "Connecting to database and saving record...";
    statusMsg.style.color = "#007bff";

    // Data object to perfectly match the analysis table columns
    const insertPayload = {
      student_id: student_id,
      student_name: student_name,
      class: classVal,
      term: term,
      subject: subject,
      ca_score: ca_score,
      exam_score: exam_score,
      total_score: total_score,
      grade: grade,
      remark: remark
    };

    try {
      const { data, error } = await supabaseClient
        .from('analysis')
        .insert([insertPayload]);

      if (error) {
        throw error;
      }

      statusMsg.innerText = "✅ Student record successfully saved to the database!";
      statusMsg.style.color = "green";
      
      // Clear out form for next entry
      document.getElementById('studentForm').reset();
      document.getElementById('totalScore').value = "";
      document.getElementById('grade').value = "";
      
    } catch (err) {
      console.error("Database Error: ", err);
      statusMsg.innerText = "❌ Error saving to Supabase: " + (err.message || err);
      statusMsg.style.color = "red";
    }
  }
</script>

</body>
</html>
